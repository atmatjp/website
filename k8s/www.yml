apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-website
  namespace: default
spec:
  revisionHistoryLimit: 2
  replicas: 2
  selector:
    matchLabels:
      app: astro-web
  template:
    metadata:
      labels:
        app: astro-web
    spec:
      containers:
      - name: website
        image: ghcr.io/atmatjp/website:5276c4fa3d29aafd5e2d10ef79f4377df9bb36bf
        ports:
        - containerPort: 80

      - name: cloudflared
        image: cloudflare/cloudflared:latest
        command: ["cloudflared", "tunnel", "--no-autoupdate", "run"]
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-secret
              key: TUNNEL_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: default
spec:
  selector:
    app: astro-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80